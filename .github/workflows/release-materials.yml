name: Release materials

# FACULTY CONSOLE. Actions → Release materials → Run workflow.
# Drips selected sessions from the PRIVATE master content repo into the
# cohort-private `materials` repo (private + students-team read). Only released
# sessions appear — "each week opens up".

on:
  workflow_dispatch:
    inputs:
      master_org:
        description: "Master org (e.g. Hertie-School-Deep-Learning-EXAMPLE)"
        required: true
      content_repo:
        description: "Content repo name in the master org (e.g. content-f2025)"
        required: true
      cohort_org:
        description: "Cohort org, target (e.g. Deep-Learning-EXAMPLE-f2026)"
        required: true
      sessions:
        description: "Sessions to release, space-separated (e.g. 1 2 3)"
        required: true

jobs:
  check-team:
    runs-on: ubuntu-latest
    steps:
      - name: Verify triggering user is in faculty or admin team
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          for team in faculty admin; do
            state=$(gh api "orgs/hertie-data-science-lab/teams/$team/memberships/$ACTOR" \
                     --jq '.state' 2>/dev/null || true)
            if [ "$state" = "active" ]; then exit 0; fi
          done
          echo "::error::$ACTOR is not in the faculty or admin team — access denied"
          exit 1

  release:
    needs: check-team
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run release
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          MASTER_ORG: ${{ inputs.master_org }}
          CONTENT_REPO: ${{ inputs.content_repo }}
          COHORT_ORG: ${{ inputs.cohort_org }}
          SESSIONS: ${{ inputs.sessions }}
        run: |
          gh auth setup-git
          python3 -m dsl_course.release \
            --master-org "$MASTER_ORG" --content-repo "$CONTENT_REPO" \
            --cohort-org "$COHORT_ORG" --sessions $SESSIONS
