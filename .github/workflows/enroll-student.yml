name: Enroll student

# FACULTY CONSOLE. Actions → Enroll student → Run workflow.
# Faculty override for the self-service welcome Join issue: grant a handle org
# membership + students-team membership. Leave handle blank to re-materialise the
# whole roster's access from students.csv.

on:
  workflow_dispatch:
    inputs:
      cohort_org:
        description: "Cohort org (e.g. Deep-Learning-EXAMPLE-f2026)"
        required: true
      handle:
        description: "GitHub handle to enroll (blank = sync whole roster)"
        required: false
        default: ""
      prune:
        description: "When syncing the whole roster, remove members no longer on it"
        required: false
        default: false
        type: boolean

jobs:
  check-team:
    runs-on: ubuntu-latest
    steps:
      - name: Verify triggering user is in faculty or admin team
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          for team in faculty admin; do
            state=$(gh api "orgs/hertie-data-science-lab/teams/$team/memberships/$ACTOR" \
                     --jq '.state' 2>/dev/null || true)
            if [ "$state" = "active" ]; then exit 0; fi
          done
          echo "::error::$ACTOR is not in the faculty or admin team — access denied"
          exit 1

  enroll:
    needs: check-team
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run enroll
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          COHORT_ORG: ${{ inputs.cohort_org }}
          HANDLE: ${{ inputs.handle }}
          PRUNE: ${{ inputs.prune }}
        run: |
          args=(--cohort-org "$COHORT_ORG")
          [ -n "$HANDLE" ] && args+=(--handle "$HANDLE")
          [ "$PRUNE" = "true" ] && args+=(--prune)
          python3 -m dsl_course.sync_roster "${args[@]}"
