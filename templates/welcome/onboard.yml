name: Onboard student

# Seed this into a cohort's public `welcome` repo as
# .github/workflows/onboard.yml. Students open a "Join" issue here; the issue
# AUTHOR is the authenticated GitHub handle (unspoofable). We match the typed
# student ID against the PRIVATE classroom-config/students.csv, reject non-enrolees,
# record the handle + immutable GitHub id, then grant org + students-team access.
#
# Runs under secrets.DSL_BOT_TOKEN, which needs, on the cohort org: Contents R/W on
# classroom-config, Members R/W (org invite + team), Issues R/W on welcome.

on:
  issues:
    types: [opened]

concurrency:
  group: onboard-roster
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  onboard:
    if: startsWith(github.event.issue.title, 'Join')
    runs-on: ubuntu-latest
    steps:
      - name: Match roster, capture handle, grant access
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DSL_BOT_TOKEN || github.token }}
          script: |
            const org    = context.repo.owner;            // the cohort org
            const issue  = context.payload.issue;
            const handle = issue.user.login;              // authenticated identity
            const userId = issue.user.id;                 // immutable — key on this
            const CONFIG = 'classroom-config', FILE = 'students.csv';

            const fail = async (msg, label) => {
              await github.rest.issues.createComment({
                owner: org, repo: context.repo.repo, issue_number: issue.number, body: msg });
              await github.rest.issues.addLabels({
                owner: org, repo: context.repo.repo, issue_number: issue.number, labels: [label] });
              core.setFailed(msg.replace(/\*\*/g, ''));
            };

            if (!process.env.HAS_BOT) {
              return fail(
                `Thanks @${handle} — enrolment is **not yet armed**: the \`DSL_BOT_TOKEN\` secret is unset, ` +
                `so I can't read the private roster or invite you. A maintainer will action this.`,
                'needs-review');
            }

            // Parse the student_id the issue form collected (alphanumeric IDs allowed).
            const m = (issue.body || '').match(/Student ID\s*[\r\n]+\s*([A-Za-z0-9][\w-]*)/i);
            const studentId = m && m[1];
            if (!studentId) return fail(
              `Thanks @${handle} — I couldn't read a **Student ID** from the form. Please edit the issue and add it.`,
              'needs-review');

            // Read the PRIVATE roster.
            const got = await github.rest.repos.getContent({ owner: org, repo: CONFIG, path: FILE });
            const sha = got.data.sha;
            const lines = Buffer.from(got.data.content, 'base64').toString('utf8').replace(/\n$/, '').split('\n');
            const header = lines[0];
            const rows = lines.slice(1).map(l => l.split(','));   // [student_id,email,name,handle,id,section]

            // Match the authenticated handle to a registrar-seeded row — reject non-enrolees.
            const row = rows.find(r => r[0] === studentId);
            if (!row) return fail(
              `Thanks @${handle} — student ID **${studentId}** isn't on the enrolment roster. ` +
              `If you believe you're enrolled, contact the teaching team.`,
              'needs-review');
            if (row[3] && row[3].toLowerCase() !== handle.toLowerCase()) return fail(
              `Student ID **${studentId}** is already linked to a different GitHub account. ` +
              `Contact the teaching team to resolve this.`,
              'needs-review');

            // Write the authenticated handle + immutable id back (idempotent).
            const already = row[3] === handle;
            row[3] = handle; row[4] = String(userId);
            if (!already) {
              const body = [header, ...rows.map(r => r.join(','))].join('\n') + '\n';
              await github.rest.repos.createOrUpdateFileContents({
                owner: org, repo: CONFIG, path: FILE, sha,
                message: `roster: link ${studentId} -> @${handle} (id ${userId})`,
                content: Buffer.from(body, 'utf8').toString('base64'),
              });
            }

            // Grant access: org membership (invites if needed) + students team.
            await github.rest.orgs.setMembershipForUser({ org, username: handle, role: 'member' });
            await github.rest.teams.addOrUpdateMembershipForUserInOrg({
              org, team_slug: 'students', username: handle, role: 'member' });

            // Confirm.
            await github.rest.issues.createComment({
              owner: org, repo: context.repo.repo, issue_number: issue.number, body: [
                `Welcome **@${handle}** 👋 — you're matched to the roster.`,
                ``,
                `- **⚠️ Check your email and accept the invitation to the \`${org}\` org** — until you accept, you can't see anything here.`,
                `- Your handle + GitHub id are recorded (student ID ${studentId}); you've been added to the **students** team (unlocks released materials once you've accepted).`,
                `- Your assignment repos appear here once the teaching team provisions each assignment.`,
              ].join('\n') });
            await github.rest.issues.addLabels({
              owner: org, repo: context.repo.repo, issue_number: issue.number, labels: ['enrolled'] });
            await github.rest.issues.update({
              owner: org, repo: context.repo.repo, issue_number: issue.number, state: 'closed' });
        env:
          HAS_BOT: ${{ secrets.DSL_BOT_TOKEN != '' || '' }}
