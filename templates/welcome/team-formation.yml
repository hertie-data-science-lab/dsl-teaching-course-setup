name: Form team

# Seed this into a cohort's public `welcome` repo as
# .github/workflows/team-formation.yml. Students open a "Join team" issue here; the issue
# AUTHOR is the authenticated GitHub handle (unspoofable). We verify they are an onboarded
# student, then append a row to the PRIVATE classroom-config/teams.csv - the only writer
# surface for team membership. A GitHub Team is materialised FROM that CSV later (one-way, by
# dsl_course.sync_teams), so the Team is a downstream projection that can't drift the way a
# Classroom-managed team does. Group-assignment provisioning grants that team its shared repo.
#
# Runs under secrets.DSL_BOT_TOKEN, which needs, on the cohort org: Contents R/W on
# classroom-config, Issues R/W on welcome.

on:
  issues:
    types: [opened]

concurrency:
  group: team-formation  # serialise CSV writes
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  form-team:
    if: startsWith(github.event.issue.title, 'Join team')
    runs-on: ubuntu-latest
    steps:
      - name: Verify enrolment, append team membership
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DSL_BOT_TOKEN || github.token }}
          script: |
            const MAX_TEAM_SIZE = 5;  // edit to change the cap

            const org    = context.repo.owner;            // the cohort org
            const issue  = context.payload.issue;
            const handle = issue.user.login;              // authenticated identity
            const CONFIG = 'classroom-config';
            const TEAMS  = 'teams.csv', ROSTER = 'students.csv';

            const fail = async (msg, label) => {
              await github.rest.issues.createComment({
                owner: org, repo: context.repo.repo, issue_number: issue.number, body: msg });
              await github.rest.issues.addLabels({
                owner: org, repo: context.repo.repo, issue_number: issue.number, labels: [label] });
              core.setFailed(msg.replace(/\*\*/g, ''));
            };

            if (!process.env.HAS_BOT) {
              return fail(
                `Thanks @${handle} - team formation is **not yet armed**: the \`DSL_BOT_TOKEN\` secret ` +
                `is unset, so I can't read the roster or record your team. A maintainer will action this.`,
                'needs-review');
            }

            // Parse the assignment slug + team name from the issue form.
            const aMatch = (issue.body || '').match(/Assignment\s*[\r\n]+\s*([A-Za-z0-9][\w.-]*)/i);
            const tMatch = (issue.body || '').match(/Team\s*[\r\n]+\s*([A-Za-z0-9][\w-]*)/i);
            const assignment = aMatch && aMatch[1];
            const team = tMatch && tMatch[1];
            if (!assignment || !team) return fail(
              `Thanks @${handle} - I couldn't read both an **Assignment** and a **Team** from the form. ` +
              `Team names use letters, numbers and dashes only. Please edit the issue.`,
              'needs-review');

            // Verify the author is an onboarded student (handle recorded in the roster).
            const rosterRaw = await github.rest.repos.getContent({ owner: org, repo: CONFIG, path: ROSTER });
            const rosterRows = Buffer.from(rosterRaw.data.content, 'base64').toString('utf8')
              .replace(/\n$/, '').split('\n').slice(1).map(l => l.split(','));
            const enrolled = rosterRows.some(r => (r[3] || '').toLowerCase() === handle.toLowerCase());
            if (!enrolled) return fail(
              `Thanks @${handle} - I can't find you on the roster yet. Please open a **Join** issue first ` +
              `to onboard, then come back to join a team.`,
              'needs-review');

            // Read teams.csv (create it on first use).
            let sha = null, rows = [];
            const header = 'assignment,team,github_handle';
            try {
              const got = await github.rest.repos.getContent({ owner: org, repo: CONFIG, path: TEAMS });
              sha = got.data.sha;
              rows = Buffer.from(got.data.content, 'base64').toString('utf8')
                .replace(/\n$/, '').split('\n').slice(1).filter(Boolean).map(l => l.split(','));
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // One team per student per assignment; respect the size cap; idempotent re-open.
            const mine = rows.find(r => r[0] === assignment && r[2].toLowerCase() === handle.toLowerCase());
            if (mine && mine[1] === team) {
              await github.rest.issues.createComment({
                owner: org, repo: context.repo.repo, issue_number: issue.number,
                body: `You're already in **${team}** for \`${assignment}\` @${handle} - nothing to do.` });
              await github.rest.issues.update({
                owner: org, repo: context.repo.repo, issue_number: issue.number, state: 'closed' });
              return;
            }
            if (mine) return fail(
              `You're already in team **${mine[1]}** for \`${assignment}\` @${handle}. ` +
              `Contact the teaching team to switch teams.`,
              'needs-review');
            const size = rows.filter(r => r[0] === assignment && r[1] === team).length;
            if (size >= MAX_TEAM_SIZE) return fail(
              `Team **${team}** for \`${assignment}\` is full (${MAX_TEAM_SIZE} members). ` +
              `Pick another team name.`,
              'needs-review');

            // Append + write back.
            rows.push([assignment, team, handle]);
            const body = [header, ...rows.map(r => r.join(','))].join('\n') + '\n';
            await github.rest.repos.createOrUpdateFileContents({
              owner: org, repo: CONFIG, path: TEAMS, ...(sha ? { sha } : {}),
              message: `teams: ${handle} -> ${team} (${assignment})`,
              content: Buffer.from(body, 'utf8').toString('base64'),
            });

            // Confirm.
            await github.rest.issues.createComment({
              owner: org, repo: context.repo.repo, issue_number: issue.number, body: [
                `Done **@${handle}** - you're in team **${team}** for \`${assignment}\`.`,
                ``,
                `- Membership is recorded; your team's repo appears once the teaching team provisions this assignment.`,
                `- Need to change teams? Contact the teaching team.`,
              ].join('\n') });
            await github.rest.issues.addLabels({
              owner: org, repo: context.repo.repo, issue_number: issue.number, labels: ['team-recorded'] });
            await github.rest.issues.update({
              owner: org, repo: context.repo.repo, issue_number: issue.number, state: 'closed' });
        env:
          HAS_BOT: ${{ secrets.DSL_BOT_TOKEN != '' || '' }}
