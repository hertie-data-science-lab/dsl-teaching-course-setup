name: Join the course
description: Open this to join the course
title: "Join: <your name>"
labels: ["onboarding"]
body:
  - type: markdown
    attributes:
      value: |
        Your **GitHub handle is captured automatically** - you are the issue author, so it is authenticated and cannot be faked.
        Enter your **university email** so we can match you to the enrolment list.
        🔒 For privacy, the bot **redacts your email from this issue** as soon as it has matched you (this is a public repo, so don't add any other personal data).
  - type: input
    id: email
    attributes:
      label: University email
      description: Used only to match you to the enrolment list; redacted right after.
      placeholder: "e.g. a.lovelace@students.hertie-school.org"
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I am enrolled in this course for the current semester.
          required: true
