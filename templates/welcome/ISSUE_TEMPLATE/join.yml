name: Join the course
description: Open this to join the course
title: "Join: <your name>"
labels: ["onboarding"]
body:
  - type: markdown
    attributes:
      value: |
        Your **GitHub handle is captured automatically** - you are the issue author, so it is authenticated and cannot be faked.
        Paste the **enrolment code** the teaching team emailed to your university address.
        The code is random and **not personal data**, so it's safe here even though this is a public repo - but **don't add any other personal details**.
  - type: input
    id: enrol_code
    attributes:
      label: Enrolment code
      description: The code emailed to your university address (looks like dsl-xxxxxx).
      placeholder: "dsl-ab3k9m"
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I am enrolled in this course for the current semester.
          required: true
