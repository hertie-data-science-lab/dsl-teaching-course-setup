name: Dispatch membership sync

# Seed this into a cohort's private classroom-config repo as
# .github/workflows/dispatch-sync.yml. classroom-config has no other workflows of its
# own - this file's only job is to trigger the course org's consolidated Sync
# membership workflow (in <course-org>/.github) whenever students.csv or teams.csv
# changes here, so a commit takes effect immediately without an extra manual click.
#
# Reads the course org from THIS cohort's own dsl-course.yml (single source of truth -
# no course-org name baked in at bootstrap time). Fires a `repository_dispatch` (not
# `workflow_dispatch`) so Sync membership's ungated automatic path picks it up, rather
# than the human-only, check-team-gated manual path. Runs under secrets.DSL_BOT_TOKEN,
# which needs Contents read here (to read dsl-course.yml) and Actions write on the
# course org's .github (to dispatch) - both already granted by bootstrap.

on:
  push:
    branches: [main]
    paths:
      - students.csv
      - teams.csv

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sync membership in the course org
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          COHORT_ORG: ${{ github.repository_owner }}
        run: |
          course_org=$(gh api "repos/$COHORT_ORG/.github/contents/dsl-course.yml" \
            --jq '.content | @base64d' | grep '^course:' | cut -d: -f2- | xargs)
          if [ -z "$course_org" ]; then
            echo "::error::no 'course:' line in $COHORT_ORG/.github/dsl-course.yml - can't find the course org to dispatch to."
            exit 1
          fi
          gh api "repos/$course_org/.github/dispatches" \
            -f event_type=sync-membership \
            -f "client_payload[cohort_org]=$COHORT_ORG"
